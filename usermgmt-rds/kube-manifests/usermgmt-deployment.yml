apiVersion: apps/v1
kind: Deployment
metadata:
  name: usermgmt
  labels:
    app.kubernetes.io/name: usermgmt
    app.kubernetes.io/instance: usermgmt
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: usermgmt-platform

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: usermgmt
      app.kubernetes.io/instance: usermgmt
      app.kubernetes.io/component: service
      app.kubernetes.io/owner: usermgmt-platform

  template:
    metadata:
      annotations:
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8095"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/name: usermgmt
        app.kubernetes.io/instance: usermgmt
        app.kubernetes.io/component: service
        app.kubernetes.io/owner: usermgmt-platform

    spec:
      serviceAccountName: usermgmt

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: usermgmt

        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: usermgmt

      securityContext:
        fsGroup: 1000

      initContainers:
        - name: wait-for-rds
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RDS..."
              until nc -z mysql 3306; do
                sleep 2
              done
              echo "RDS is available."

      containers:
        - name: usermgmt
          image: stacksimplify/kube-usermanagement-microservice:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8095
              protocol: TCP

          env:
            - name: DB_HOSTNAME
              value: mysql

            - name: DB_PORT
              value: "3306"

            - name: DB_NAME
              value: usermgmt

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: usermgmt-db
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: usermgmt-db
                  key: DB_PASSWORD

          readinessProbe:
            httpGet:
              path: /usermgmt/health-status
              port: 8095
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /usermgmt/health-status
              port: 8095
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          securityContext:
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp

            - name: aws-secrets
              mountPath: /mnt/secrets-store
              readOnly: true

      volumes:
        - name: tmp-volume
          emptyDir:
            medium: Memory

        - name: aws-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: usermgmt-db-secrets