apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: usermgmt-db-secrets

spec:
  provider: aws

  parameters:
    usePodIdentity: "true"
    objects: |
      - objectName: "mysql-db-secret-1"
        objectType: "secretsmanager"
        jmesPath:
          - path: "MYSQL_USER"
            objectAlias: "DB_USERNAME"
          - path: "MYSQL_PASSWORD"
            objectAlias: "DB_PASSWORD"

  secretObjects:
    - secretName: usermgmt-db
      type: Opaque
      data:
        - objectName: DB_USERNAME
          key: DB_USERNAME
        - objectName: DB_PASSWORD
          key: DB_PASSWORD