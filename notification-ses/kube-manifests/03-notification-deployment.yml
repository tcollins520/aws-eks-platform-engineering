apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/instance: notification
    app.kubernetes.io/component: service
    app.kubernetes.io/owner: usermgmt-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: notification
      app.kubernetes.io/instance: notification

  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification
        app.kubernetes.io/instance: notification
        app.kubernetes.io/component: service
        app.kubernetes.io/owner: usermgmt-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8096"

    spec:
      serviceAccountName: notification

      # Pod Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: notification

        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: notification

      containers:
        - name: notification
          image: stacksimplify/kube-notifications-microservice:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8096

          env:
            - name: AWS_MAIL_SERVER_HOST
              value: email-smtp.us-east-1.amazonaws.com

            - name: AWS_MAIL_SERVER_FROM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: notification-email
                  key: SMTP_FROM

            - name: AWS_MAIL_SERVER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notification-email
                  key: SMTP_USERNAME

            - name: AWS_MAIL_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-email
                  key: SMTP_PASSWORD

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          readinessProbe:
            tcpSocket:
              port: 8096
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 8096
            initialDelaySeconds: 60
            periodSeconds: 10

          # Container Security Context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: aws-secrets
              mountPath: /mnt/secrets-store
              readOnly: true

      volumes:
        - name: aws-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: notification-email-secrets