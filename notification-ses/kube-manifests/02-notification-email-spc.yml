apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: notification-email-secrets
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    objects: |
      - objectName: "notification-email-secret"
        objectType: "secretsmanager"
        jmesPath:
          - path: "SMTP_USERNAME"
            objectAlias: "SMTP_USERNAME"
          - path: "SMTP_PASSWORD"
            objectAlias: "SMTP_PASSWORD"
          - path: "SMTP_FROM"
            objectAlias: "SMTP_FROM"

  secretObjects:
    - secretName: notification-email
      type: Opaque
      data:
        - objectName: SMTP_USERNAME
          key: SMTP_USERNAME
        - objectName: SMTP_PASSWORD
          key: SMTP_PASSWORD
        - objectName: SMTP_FROM
          key: SMTP_FROM